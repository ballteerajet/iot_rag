<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบวิเคราะห์เซนเซอร์</title>
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
}
.chat-box {
    width: 600px;
    margin-top: 40px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
.messages {
    height: 400px;
    overflow-y: auto;
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 10px;
}
.user { color: blue; }
.bot { color: green; }
</style>
</head>
<body>

<div class="chat-box">
    <h2>💬 ระบบแชทวิเคราะห์ข้อมูลเซนเซอร์</h2>
    <div class="messages" id="messages"></div>

    <input type="text" id="input" style="width:80%">
    <button onclick="send()">ส่ง</button>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const msg = input.value;
    if (!msg) return;

    const messages = document.getElementById("messages");
    messages.innerHTML += `<div class="user"><b>คุณ:</b> ${msg}</div>`;

    input.value = "";

    const response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    const data = await response.json();

    messages.innerHTML += `<div class="bot"><b>ระบบ:</b> ${data.answer}</div>`;
    messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
